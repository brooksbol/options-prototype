# SQLite database path (same as TypeScript service)
evidence.db.path=./data/evidence.sqlite3

# Provider configuration (loaded from environment)
tradier.api-key=${TRADIER_API_KEY:}
tradier.base-url=${TRADIER_BASE_URL:https://sandbox.tradier.com/v1}
